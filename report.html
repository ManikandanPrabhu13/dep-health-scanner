<!DOCTYPE html>
<html>
<head>
    <title>Dep Health Scanner</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        .score { font-size: 48px; font-weight: bold; color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        .summary { display: flex; gap: 20px; margin: 20px 0; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; }
    </style>
</head>
<body>
    <h1>Dependency Health Scanner</h1>
    <p>Repo: <a href="https://github.com/psf/requests">https://github.com/psf/requests</a> | Ecosystem: Python/PyPI | 19 Jun 2026</p>
    <div class="score">Health Score: 0%</div>
    <div class="summary">
        <div class="card"><h3 style="color:#2ecc71">0</h3><p>Up to Date</p></div>
        <div class="card"><h3 style="color:#e74c3c">0</h3><p>Outdated</p></div>
        <div class="card"><h3 style="color:#f39c12">0</h3><p>Not Found</p></div>
    </div>
    <table>
        <tr><th>Package</th><th>Current</th><th>Latest</th><th>Status</th></tr>
        
    </table>
</body>
</html>
